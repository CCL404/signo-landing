<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" width="100%" height="100%">
  <defs>
    <!-- Technical screen grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="5" result="n"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.03"/></feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="600" height="750" fill="#f3f4f3" filter="url(#grain)"/>

  <!-- ===== Subtle grid background ===== -->
  <g stroke="rgba(0,0,0,0.03)" stroke-width="0.5">
    <line x1="0" y1="0" x2="600" y2="0"/>
    <line x1="0" y1="50" x2="600" y2="50"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="450" x2="600" y2="450"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="550" x2="600" y2="550"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="0" y1="650" x2="600" y2="650"/>
    <line x1="0" y1="700" x2="600" y2="700"/>
    <line x1="0" y1="750" x2="600" y2="750"/>
    <line x1="0" y1="0" x2="0" y2="750"/>
    <line x1="50" y1="0" x2="50" y2="750"/>
    <line x1="100" y1="0" x2="100" y2="750"/>
    <line x1="150" y1="0" x2="150" y2="750"/>
    <line x1="200" y1="0" x2="200" y2="750"/>
    <line x1="250" y1="0" x2="250" y2="750"/>
    <line x1="300" y1="0" x2="300" y2="750"/>
    <line x1="350" y1="0" x2="350" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="750"/>
    <line x1="450" y1="0" x2="450" y2="750"/>
    <line x1="500" y1="0" x2="500" y2="750"/>
    <line x1="550" y1="0" x2="550" y2="750"/>
    <line x1="600" y1="0" x2="600" y2="750"/>
  </g>

  <!-- ===== Outer frame (inspection panel) ===== -->
  <rect x="30" y="30" width="540" height="690" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1.5"/>
  <rect x="36" y="36" width="528" height="678" fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="0.5"/>

  <!-- Frame corner marks -->
  <g stroke="rgba(0,0,0,0.15)" stroke-width="1.5" fill="none">
    <!-- TL -->
    <line x1="44" y1="30" x2="44" y2="44"/>
    <line x1="44" y1="44" x2="30" y2="44"/>
    <!-- TR -->
    <line x1="570" y1="30" x2="570" y2="44"/>
    <line x1="570" y1="44" x2="556" y2="44"/>
    <!-- BL -->
    <line x1="44" y1="720" x2="44" y2="706"/>
    <line x1="44" y1="706" x2="30" y2="706"/>
    <!-- BR -->
    <line x1="570" y1="720" x2="570" y2="706"/>
    <line x1="570" y1="706" x2="556" y2="706"/>
  </g>

  <!-- ===== Vertical measurement scale (left) ===== -->
  <g stroke="rgba(0,0,0,0.12)" stroke-width="0.5">
    <line x1="52" y1="60" x2="62" y2="60"/>
    <text x="66" y="63" font-family="'Courier New', monospace" font-size="7" fill="rgba(0,0,0,0.15)" letter-spacing="1">300</text>
    <line x1="52" y1="160" x2="62" y2="160"/>
    <text x="66" y="163" font-family="'Courier New', monospace" font-size="7" fill="rgba(0,0,0,0.15)" letter-spacing="1">600</text>
    <line x1="52" y1="260" x2="62" y2="260"/>
    <text x="66" y="263" font-family="'Courier New', monospace" font-size="7" fill="rgba(0,0,0,0.15)" letter-spacing="1">900</text>
    <line x1="52" y1="360" x2="62" y2="360"/>
    <text x="66" y="363" font-family="'Courier New', monospace" font-size="7" fill="rgba(0,0,0,0.15)" letter-spacing="1">1200</text>
    <line x1="52" y1="460" x2="62" y2="460"/>
    <text x="66" y="463" font-family="'Courier New', monospace" font-size="7" fill="rgba(0,0,0,0.15)" letter-spacing="1">1500</text>
    <line x1="52" y1="560" x2="62" y2="560"/>
    <text x="66" y="563" font-family="'Courier New', monospace" font-size="7" fill="rgba(0,0,0,0.15)" letter-spacing="1">1800</text>
    <line x1="52" y1="660" x2="62" y2="660"/>
    <text x="66" y="663" font-family="'Courier New', monospace" font-size="7" fill="rgba(0,0,0,0.15)" letter-spacing="1">2100</text>
    <!-- continuous vertical line -->
    <line x1="56" y1="60" x2="56" y2="700" stroke="rgba(0,0,0,0.06)"/>
  </g>

  <!-- ===== Horizontal measurement scale (bottom) ===== -->
  <g stroke="rgba(0,0,0,0.12)" stroke-width="0.5">
    <line x1="80" y1="708" x2="80" y2="700"/>
    <line x1="180" y1="708" x2="180" y2="700"/>
    <line x1="280" y1="708" x2="280" y2="700"/>
    <line x1="380" y1="708" x2="380" y2="700"/>
    <line x1="480" y1="708" x2="480" y2="700"/>
    <line x1="80" y1="700" x2="520" y2="700" stroke="rgba(0,0,0,0.06)"/>
  </g>

  <!-- ===== Large concentric circles (inspection lens) ===== -->
  <g fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="0.8">
    <circle cx="300" cy="340" r="180"/>
    <circle cx="300" cy="340" r="160"/>
    <circle cx="300" cy="340" r="100"/>
    <circle cx="300" cy="340" r="60"/>
  </g>

  <!-- Crosshair through circles -->
  <g stroke="rgba(0,0,0,0.06)" stroke-width="0.5">
    <line x1="120" y1="340" x2="480" y2="340"/>
    <line x1="300" y1="160" x2="300" y2="520"/>
  </g>

  <!-- ===== Geometric ring segments (technical) ===== -->
  <g fill="none" stroke="rgba(0,0,0,0.04)" stroke-width="0.5">
    <circle cx="300" cy="340" r="140" stroke-dasharray="4 6"/>
    <circle cx="300" cy="340" r="120" stroke-dasharray="2 8"/>
  </g>

  <!-- ===== Angular construction lines ===== -->
  <g stroke="rgba(0,0,0,0.05)" stroke-width="0.5">
    <line x1="300" y1="340" x2="120" y2="160"/>
    <line x1="300" y1="340" x2="480" y2="160"/>
    <line x1="300" y1="340" x2="120" y2="520"/>
    <line x1="300" y1="340" x2="480" y2="520"/>
  </g>

  <!-- ===== Small annotation dots on circles ===== -->
  <g fill="rgba(0,0,0,0.12)">
    <circle cx="300" cy="160" r="2.5"/>
    <circle cx="300" cy="520" r="2.5"/>
    <circle cx="120" cy="340" r="2.5"/>
    <circle cx="480" cy="340" r="2.5"/>
    <circle cx="203" cy="203" r="2"/>
    <circle cx="397" cy="203" r="2"/>
    <circle cx="203" cy="477" r="2"/>
    <circle cx="397" cy="477" r="2"/>
  </g>

  <!-- ===== Annotation labels ===== -->
  <g font-family="'Courier New', monospace" font-size="6.5" fill="rgba(0,0,0,0.12)">
    <text x="200" y="148">r₁ 180mm</text>
    <text x="200" y="535">r₂ 60mm</text>
  </g>

  <!-- ===== Right side: technical callout box ===== -->
  <g stroke="rgba(0,0,0,0.06)" stroke-width="0.5" fill="none">
    <rect x="390" y="550" width="130" height="80"/>
    <line x1="390" y1="560" x2="520" y2="560"/>
    <line x1="390" y1="570" x2="520" y2="570"/>
    <line x1="390" y1="580" x2="520" y2="580"/>
  </g>
  <g font-family="'Courier New', monospace" font-size="5.5" fill="rgba(0,0,0,0.08)">
    <text x="396" y="556">SIGN-01</text>
    <text x="396" y="567">SPEC: AL-BRUSH</text>
    <text x="396" y="577">FINISH: MATTE</text>
    <text x="396" y="587">QTY: 12</text>
  </g>

  <!-- ===== Bottom-left: scale bar ===== -->
  <g stroke="rgba(0,0,0,0.15)" stroke-width="1">
    <line x1="80" y1="690" x2="130" y2="690"/>
    <line x1="80" y1="686" x2="80" y2="694"/>
    <line x1="105" y1="688" x2="105" y2="692"/>
    <line x1="130" y1="686" x2="130" y2="694"/>
  </g>
  <text x="80" y="682" font-family="'Courier New', monospace" font-size="6" fill="rgba(0,0,0,0.12)">50mm</text>

  <!-- ===== Small compass/arc indicator at top-right ===== -->
  <g fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="0.5">
    <path d="M490,80 A40,40 0 0,1 530,120"/>
    <line x1="490" y1="80" x2="505" y2="65"/>
    <line x1="530" y1="120" x2="545" y2="105"/>
  </g>

  <!-- ===== Registration marks (crosshair targets) ===== -->
  <g stroke="rgba(0,0,0,0.1)" stroke-width="0.8">
    <!-- TL -->
    <circle cx="80" cy="80" r="6" fill="none"/>
    <line x1="74" y1="80" x2="86" y2="80"/>
    <line x1="80" y1="74" x2="80" y2="86"/>
    <!-- BR -->
    <circle cx="520" cy="660" r="6" fill="none"/>
    <line x1="514" y1="660" x2="526" y2="660"/>
    <line x1="520" y1="654" x2="520" y2="666"/>
  </g>

  <!-- ===== Small geometric dots along frame ===== -->
  <g fill="rgba(0,0,0,0.05)">
    <circle cx="56" cy="380" r="1.5"/>
    <circle cx="544" cy="380" r="1.5"/>
    <circle cx="300" cy="54" r="1.5"/>
    <circle cx="300" cy="696" r="1.5"/>
  </g>

  <!-- ===== Arrow indicators ===== -->
  <g stroke="rgba(0,0,0,0.08)" stroke-width="0.8" fill="none" marker-end="none">
    <!-- Left arrow pointing right -->
    <line x1="90" y1="240" x2="130" y2="240"/>
    <polygon points="130,235 140,240 130,245" fill="rgba(0,0,0,0.08)"/>
    <!-- Right arrow pointing left -->
    <line x1="510" y1="440" x2="470" y2="440"/>
    <polygon points="470,435 460,440 470,445" fill="rgba(0,0,0,0.08)"/>
  </g>

  <!-- ===== Text note ===== -->
  <text x="300" y="640" font-family="'Courier New', monospace" font-size="7" fill="rgba(0,0,0,0.12)" text-anchor="middle" letter-spacing="2">NTS · NOT TO SCALE</text>
</svg>
