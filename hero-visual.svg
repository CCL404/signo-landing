<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <!-- Paper grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" seed="3" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feComponentTransfer in="g"><feFuncA type="linear" slope="0.04"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>

    <!-- Heavy brush — thick, splintered, irregular -->
    <filter id="brushH" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Medium brush -->
    <filter id="brushM" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="2" seed="13" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="B"/>
    </filter>

    <!-- Splatter / ink spray effect -->
    <filter id="splatter" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="19" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="B" yChannelSelector="R"/>
    </filter>

    <linearGradient id="sageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8FA392"/>
      <stop offset="100%" stop-color="#6a7d6e"/>
    </linearGradient>

    <linearGradient id="sageLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8bca8"/>
      <stop offset="100%" stop-color="#8FA392"/>
    </linearGradient>

    <linearGradient id="branchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a4e42"/>
      <stop offset="100%" stop-color="#7a6e5e"/>
    </linearGradient>
  </defs>

  <!-- Canvas -->
  <rect width="400" height="500" fill="#f4f0ea" filter="url(#grain)"/>

  <!-- Very subtle sage atmosphere wash -->
  <ellipse cx="200" cy="180" rx="200" ry="160" fill="#8FA392" opacity="0.018"/>

  <!-- ===== Branch — ONE big, bold diagonal slash ===== -->
  <g filter="url(#brushH)">
    <path d="M-20 460 Q60 400 140 340 Q200 290 270 260 Q340 235 420 250"
          fill="none" stroke="url(#branchGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle secondary branch line — quick flick -->
  <g filter="url(#brushM)" opacity="0.6">
    <path d="M170 325 Q185 290 200 260 Q210 240 215 225"
          fill="none" stroke="#6a5e52" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- ===== Pigeon — abstract, 3 strokes ===== -->

  <!-- Stroke 1: Body — bold sage oval/slash -->
  <g filter="url(#brushM)">
    <path d="M250 280 Q225 245 195 235 Q180 230 175 240 Q172 250 185 270 Q200 290 225 300 Q245 305 258 295 Q262 288 250 280Z"
          fill="url(#sageGrad)" opacity="0.92"/>
  </g>

  <!-- Stroke 2: Wing / tail — a single decisive slash -->
  <g filter="url(#brushH)">
    <path d="M248 290 Q265 310 278 335 Q282 345 270 342 Q258 335 248 318 Q242 305 248 290Z"
          fill="#5a6d5e" opacity="0.85"/>
  </g>

  <!-- Stroke 3: Head — a simple round dab -->
  <g filter="url(#splatter)">
    <ellipse cx="188" cy="228" rx="14" ry="13" fill="#8FA392"/>
  </g>

  <!-- Beak — quick tiny slash -->
  <g filter="url(#brushM)">
    <path d="M176 225 L162 222 L175 228Z" fill="#5a4e42"/>
  </g>

  <!-- Eye — single dot -->
  <circle cx="184" cy="225" r="3" fill="#3a3228"/>
  <circle cx="183" cy="224" r="1" fill="#faf6ef" opacity="0.6"/>

  <!-- Legs — two loose lines down to branch -->
  <g filter="url(#brushM)" opacity="0.7">
    <line x1="228" y1="295" x2="226" y2="304" stroke="#5a4e42" stroke-width="3" stroke-linecap="round"/>
    <line x1="238" y1="297" x2="240" y2="306" stroke="#5a4e42" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ===== Calligraphy seal mark — right side ===== -->
  <g filter="url(#brushM)" opacity="0.18">
    <!-- Vertical stamp mark -->
    <rect x="350" y="80" width="2" height="35" rx="1" fill="#7B8E7F"/>
    <rect x="359" y="85" width="2" height="25" rx="1" fill="#7B8E7F"/>
    <rect x="368" y="82" width="2" height="30" rx="1" fill="#7B8E7F"/>
    <!-- Seal frame -->
    <rect x="346" y="75" width="28" height="42" rx="1" fill="none" stroke="#7B8E7F" stroke-width="1.2"/>
  </g>

  <!-- Bottom-right stamp -->
  <g filter="url(#splatter)" opacity="0.1">
    <rect x="372" y="457" width="18" height="18" rx="1" fill="#6a7d6e"/>
  </g>

</svg>
