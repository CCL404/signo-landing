<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
  <defs>
    <!-- Paper grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="5" seed="3" result="n"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.045"/></feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>

    <!-- MAXIMUM ROUGH — jagged, broken, splintered brush -->
    <filter id="brushX" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.35" numOctaves="4" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Heavy rough -->
    <filter id="brushH" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Medium slash -->
    <filter id="brushM" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="29" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="B"/>
    </filter>

    <!-- Ink splatter dots -->
    <filter id="dot" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="2" seed="37" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="B" yChannelSelector="R"/>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="400" height="500" fill="#f4f0ea" filter="url(#grain)"/>

  <!-- ===== Branch — single angular slash ===== -->
  <g filter="url(#brushX)">
    <polyline points="-20,470 30,420 80,380 130,345 180,315 220,290 260,272 300,260 340,255 380,258 420,270"
              fill="none" stroke="#5a4e42" stroke-width="18" stroke-linejoin="miter"/>
  </g>

  <!-- Secondary flick — quick upward -->
  <g filter="url(#brushH)" opacity="0.5">
    <line x1="165" y1="328" x2="195" y2="265" stroke="#6a5e52" stroke-width="6" stroke-linecap="round"/>
    <line x1="195" y1="265" x2="205" y2="235" stroke="#6a5e52" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- ===== Pigeon — just raw angular blocks ===== -->

  <!-- Body/chest block — one heavy sage splash -->
  <g filter="url(#brushX)">
    <polygon points="255,295 230,255 200,230 185,235 178,248 185,275 205,300 230,310 250,305"
             fill="#8FA392" opacity="0.92"/>
  </g>

  <!-- Wing slash — a single fierce diagonal cut -->
  <g filter="url(#brushH)">
    <polygon points="250,298 265,318 275,342 268,340 255,328 245,315 240,302"
             fill="#5a6d5e" opacity="0.88"/>
  </g>

  <!-- Head — rough lump -->
  <g filter="url(#brushX)">
    <polygon points="200,242 192,228 180,222 172,228 175,240 182,248 192,248"
             fill="#7B8E7F"/>
  </g>

  <!-- Beak — sharp angular jab -->
  <g filter="url(#brushH)">
    <polygon points="172,228 155,224 170,232" fill="#4a3e32"/>
  </g>

  <!-- Eye — raw dot -->
  <g filter="url(#dot)">
    <circle cx="182" cy="226" r="4" fill="#3a3228"/>
  </g>

  <!-- Ink splatter dots around the scene -->
  <g filter="url(#dot)" opacity="0.15">
    <circle cx="160" cy="210" r="2.5" fill="#5a6d5e"/>
    <circle cx="280" cy="275" r="3" fill="#5a6d5e"/>
    <circle cx="310" cy="250" r="1.5" fill="#5a6d5e"/>
    <circle cx="175" cy="320" r="2" fill="#5a6d5e"/>
    <circle cx="145" cy="300" r="1.8" fill="#5a6d5e"/>
  </g>

  <!-- Leg scratch marks -->
  <g filter="url(#brushM)" opacity="0.55">
    <line x1="225" y1="300" x2="222" y2="308" stroke="#4a3e32" stroke-width="4" stroke-linecap="round"/>
    <line x1="238" y1="303" x2="235" y2="310" stroke="#4a3e32" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- ===== Seal/stamp area ===== -->
  <g filter="url(#brushM)" opacity="0.12">
    <rect x="348" y="75" width="26" height="38" rx="1" fill="none" stroke="#7B8E7F" stroke-width="1.5"/>
    <line x1="353" y1="82" x2="353" y2="108" stroke="#7B8E7F" stroke-width="2.5"/>
    <line x1="360" y1="86" x2="360" y2="102" stroke="#7B8E7F" stroke-width="2.5"/>
    <line x1="367" y1="84" x2="367" y2="105" stroke="#7B8E7F" stroke-width="2.5"/>
  </g>

  <!-- Bottom sage stamp -->
  <g filter="url(#dot)" opacity="0.08">
    <rect x="373" y="458" width="16" height="16" rx="1" fill="#6a7d6e"/>
  </g>

</svg>
