<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="100%" height="100%">
  <rect width="400" height="80" fill="transparent"/>

  <!-- Left annotation column -->
  <g font-family="'Barlow Condensed','Helvetica Neue',Arial,sans-serif" fill="#111">
    <!-- 07 -->
    <text x="16" y="20" font-size="9" font-weight="600" letter-spacing="2">07</text>

    <!-- Vertical scale line -->
    <line x1="22" y1="24" x2="22" y2="58" stroke="#111" stroke-width=".5"/>
    <line x1="19" y1="28" x2="25" y2="28" stroke="#111" stroke-width=".4"/>
    <line x1="19" y1="34" x2="25" y2="34" stroke="#111" stroke-width=".4"/>
    <line x1="19" y1="40" x2="25" y2="40" stroke="#111" stroke-width=".4"/>
    <line x1="19" y1="46" x2="25" y2="46" stroke="#111" stroke-width=".4"/>
    <line x1="19" y1="52" x2="25" y2="52" stroke="#111" stroke-width=".4"/>

    <!-- Arrow indicator -->
    <polygon points="22,39 26,42 22,45" fill="#111"/>

    <!-- MMXXI -->
    <text x="16" y="69" font-size="6" font-weight="600" letter-spacing="1.5">MM</text>
    <text x="16" y="76" font-size="6" font-weight="600" letter-spacing="1.5">XXI</text>
  </g>

  <!-- Top crop marks -->
  <g stroke="#111" stroke-width=".8" fill="none">
    <line x1="46" y1="11" x2="46" y2="15"/><line x1="46" y1="15" x2="42" y2="15"/>
    <line x1="358" y1="11" x2="358" y2="15"/><line x1="358" y1="15" x2="362" y2="15"/>
  </g>

  <!-- Bottom crop marks -->
  <g stroke="#111" stroke-width=".8" fill="none">
    <line x1="46" y1="65" x2="46" y2="69"/><line x1="46" y1="65" x2="42" y2="65"/>
    <line x1="358" y1="65" x2="358" y2="69"/><line x1="358" y1="65" x2="362" y2="65"/>
  </g>

  <!-- Tick marks top/bottom center -->
  <g stroke="#111" stroke-width=".5">
    <line x1="200" y1="11" x2="200" y2="14"/>
    <line x1="200" y1="66" x2="200" y2="69"/>
  </g>

  <!-- SIGNO — massive ultra-condensed -->
  <text x="200" y="48" font-family="'Barlow Condensed','Helvetica Neue',Arial,sans-serif"
        font-size="52" font-weight="700" fill="#111"
        text-anchor="middle" letter-spacing="-2">SIGNO</text>

  <!-- STUDIO with flanking lines -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" fill="#111">
    <!-- Left line -->
    <line x1="188" y1="60" x2="218" y2="60" stroke="#111" stroke-width=".5"/>
    <!-- STUDIO -->
    <text x="222" y="62" font-size="9" font-weight="400" letter-spacing="3.5">STUDIO</text>
    <!-- Right line -->
    <line x1="276" y1="60" x2="290" y2="60" stroke="#111" stroke-width=".5"/>
    <!-- Crosshair -->
    <circle cx="294" cy="59" r="2.5" fill="none" stroke="#111" stroke-width=".5"/>
    <line x1="292" y1="59" x2="296" y2="59" stroke="#111" stroke-width=".5"/>
    <line x1="294" y1="57" x2="294" y2="61" stroke="#111" stroke-width=".5"/>
  </g>
</svg>
